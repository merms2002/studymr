name: Force Extract to Root

on:
  push:
    paths:
      - "**/*.zip"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # عشان يجيب تاريخ الريبو كله وميصلش Error في الـ Push

    - name: Unzip and Move to Root
      run: |
        # البحث عن أي ملف زيب
        find . -type f -name "*.zip" | while read file; do
          echo "Processing $file"
          # فك الملف في فولدر مؤقت الأول عشان نضمن إننا شايفين المحتوى
          mkdir -p temp_extraction
          unzip -o "$file" -d temp_extraction
          
          # نقل كل اللي جوه الفولدر المؤقت للمسار الرئيسي (الـ Root)
          cp -r temp_extraction/* .
          
          # مسح الفولدر المؤقت وملف الزيب
          rm -rf temp_extraction
          rm "$file"
        done

    - name: Push Changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add --all
        # التأكد من استثناء ملف الـ YAML نفسه عشان ميبوظش
        git add .github/workflows/*.yml 
        
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto-extract ZIP structure to root"
          git push origin main
        else
          echo "No changes to commit"
        fi
