name: Unzip Uploaded Files

on:
  push:
    paths:
      - "**/*.zip"

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Find and unzip .zip files
    - name: Unzip files
      run: |
        for file in $(find . -type f -name "*.zip"); do
          # Create a folder named after the zip file (without .zip extension)
          folder="${file%.zip}"
          mkdir -p "$folder"
          unzip -o "$file" -d "$folder"
          rm "$file" # Remove the original zip file
        done

    # Commit and push the changes
    - name: Commit and push unzipped files
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Unzipped newly uploaded files"
        git push
